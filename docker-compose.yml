services:
  # ─── Go Services ───────────────────────────────────────────────
  order-service:
    build:
      context: .
      args:
        SERVICE: order-service
    container_name: order-service
    ports:
      - "8081:8081"
    environment:
      - PRODUCT_SERVICE_URL=http://product-service:8082
      - OTEL_EXPORTER_OTLP_ENDPOINT=otel-collector:4317
    depends_on:
      - product-service
      - otel-collector
    restart: unless-stopped
    labels:
      - "com.docker.compose.service=order-service"

  product-service:
    build:
      context: .
      args:
        SERVICE: product-service
    container_name: product-service
    ports:
      - "8082:8082"
    environment:
      - OTEL_EXPORTER_OTLP_ENDPOINT=otel-collector:4317
    depends_on:
      - otel-collector
    restart: unless-stopped
    labels:
      - "com.docker.compose.service=product-service"

  # ─── Logging: Loki + Promtail ──────────────────────────────────
  loki:
    image: grafana/loki:2.9.0
    container_name: loki
    ports:
      - "3100:3100"
    volumes:
      - ./configs/loki.yml:/etc/loki/local-config.yaml
    command: -config.file=/etc/loki/local-config.yaml
    restart: unless-stopped

  promtail:
    image: grafana/promtail:2.9.0
    container_name: promtail
    volumes:
      - ./configs/promtail.yml:/etc/promtail/config.yml
      - /var/run/docker.sock:/var/run/docker.sock:ro
      - /var/lib/docker/containers:/var/lib/docker/containers:ro
    command: -config.file=/etc/promtail/config.yml
    depends_on:
      - loki
    restart: unless-stopped

  # ─── Metrics: Prometheus ───────────────────────────────────────
  prometheus:
    image: prom/prometheus:v2.47.0
    container_name: prometheus
    ports:
      - "9090:9090"
    volumes:
      - ./configs/prometheus.yml:/etc/prometheus/prometheus.yml
    command:
      - "--config.file=/etc/prometheus/prometheus.yml"
      - "--web.enable-remote-write-receiver"
      - "--enable-feature=exemplar-storage"
    restart: unless-stopped

  # ─── Tracing: Tempo ────────────────────────────────────────────
  tempo:
    image: grafana/tempo:2.3.0
    container_name: tempo
    ports:
      - "3200:3200"   # Tempo HTTP API
      - "4318:4318"   # OTLP HTTP (for debugging)
    volumes:
      - ./configs/tempo.yml:/etc/tempo/tempo.yml
    command:
      - "-config.file=/etc/tempo/tempo.yml"
    restart: unless-stopped

  # ─── OTel Collector ────────────────────────────────────────────
  otel-collector:
    image: otel/opentelemetry-collector-contrib:0.88.0
    container_name: otel-collector
    ports:
      - "4317:4317"   # OTLP gRPC
    volumes:
      - ./configs/otel-collector.yml:/etc/otelcol-contrib/config.yaml
    depends_on:
      - tempo
    restart: unless-stopped

  # ─── Visualization: Grafana ────────────────────────────────────
  grafana:
    image: grafana/grafana:10.2.0
    container_name: grafana
    ports:
      - "3000:3000"
    environment:
      - GF_SECURITY_ADMIN_USER=admin
      - GF_SECURITY_ADMIN_PASSWORD=admin
      - GF_USERS_ALLOW_SIGN_UP=false
    volumes:
      - ./configs/grafana/datasources.yml:/etc/grafana/provisioning/datasources/datasources.yml
      - ./configs/grafana/dashboards.yml:/etc/grafana/provisioning/dashboards/dashboards.yml
      - ./configs/grafana/dashboards:/var/lib/grafana/dashboards
    depends_on:
      - loki
      - prometheus
      - tempo
    restart: unless-stopped
