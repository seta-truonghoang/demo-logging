global:
  scrape_interval: 15s
  evaluation_interval: 15s

scrape_configs:
  - job_name: "order-service"
    static_configs:
      - targets: ["order-service:8081"]
        labels:
          service: "order-service"

  - job_name: "product-service"
    static_configs:
      - targets: ["product-service:8082"]
        labels:
          service: "product-service"
